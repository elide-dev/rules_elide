name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@e5ab8fc4c23cb13783fad499e8bd865fd9f6d669  # v7.6.0
    with:
      prerelease: false
      release_files: rules_elide-v*.tar.gz
