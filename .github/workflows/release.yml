name: release

on:
  push:
    branches: [main]

# Don't cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: rp
        with:
          # The enterprise policy forbids the default GITHUB_TOKEN from creating
          # pull requests, so release-please authenticates with a PAT (a user
          # token is not subject to that Actions policy). PUBLISH_TOKEN is a
          # classic PAT with `repo` + `workflow` scope.
          token: ${{ secrets.PUBLISH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  assets:
    name: release assets + provenance
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # upload release assets
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the provenance/SBOM attestations
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The release is a DRAFT here (immutable-releases compatible), so the
          # git tag does not exist yet — check out the release-PR merge commit
          # (github.sha, the commit release-please released) rather than the tag.
          fetch-depth: 0
      - name: Tag the checked-out commit locally for the source archive
        # release_prep.sh runs `git archive <tag>`; create the tag locally so the
        # archive resolves. The real remote tag is created when the draft is
        # published below.
        run: git tag --force "$TAG"
      - name: Build release assets
        run: .github/workflows/release_prep.sh "$TAG" > usage_notes.md
      - name: Generate SPDX SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          file: rules_elide-${{ env.TAG }}.tar.gz
          format: spdx-json
          output-file: rules_elide-${{ env.TAG }}.spdx.json
          upload-artifact: false
      - name: Enrich SBOM with MODULE.bazel deps
        run: python3 tools/sbom_enrich.py "rules_elide-${TAG}.spdx.json" MODULE.bazel
      - name: Upload assets to the release
        run: |
          gh release upload "$TAG" \
            "rules_elide-${TAG}.tar.gz" \
            "rules_elide-${TAG}.docs.tar.gz" \
            "rules_elide-${TAG}.spdx.json" \
            --clobber
      - name: Append Bzlmod usage notes to the release body
        run: |
          gh release view "$TAG" --json body --jq .body > body.md
          printf '\n\n' >> body.md
          cat usage_notes.md >> body.md
          gh release edit "$TAG" --notes-file body.md
      - name: Attest build provenance (Sigstore, SLSA Build L2)
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            rules_elide-${{ env.TAG }}.tar.gz
            rules_elide-${{ env.TAG }}.docs.tar.gz
            rules_elide-${{ env.TAG }}.spdx.json
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: rules_elide-${{ env.TAG }}.tar.gz
          sbom-path: rules_elide-${{ env.TAG }}.spdx.json
      # Stage the workflow artifacts publish-to-bcr consumes (bazel-contrib
      # release_ruleset's contract): `release_files` (the archives) and
      # `attestations` (per-archive <name>.intoto.jsonl = the provenance bundle
      # compacted via `jq -c`). The `bcr` job downloads these from this run, so
      # it never fetches from the (draft/immutable) Release URL.
      - name: Stage release_files + attestations for publish-to-bcr
        run: |
          mkdir -p attestations
          for a in "rules_elide-${TAG}.tar.gz" "rules_elide-${TAG}.docs.tar.gz"; do
            jq -c . < "${{ steps.attest.outputs.bundle-path }}" > "attestations/${a}.intoto.jsonl"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release_files
          path: |
            rules_elide-${{ env.TAG }}.tar.gz
            rules_elide-${{ env.TAG }}.docs.tar.gz
            rules_elide-${{ env.TAG }}.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: attestations
          path: attestations/

  bcr:
    name: publish to BCR
    needs: [release-please, assets]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@c316f1611511a40423572303f66c80bb30bfe2f8  # v1.4.1
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      registry_fork: elide-dev/bazel-central-registry
      # Run publish-to-bcr's job in the `bcr` GitHub deployment environment
      # (a reusable-workflow input — a `uses:` job can't take a top-level
      # `environment:` key). Lets us gate/track the BCR deploy via Environments
      # (protection rules / required reviewers). Requires a `bcr` environment in
      # repo Settings → Environments. PUBLISH_TOKEN stays a repo/org secret
      # (it's passed into the reusable workflow below).
      environment: bcr
      # The release is still a DRAFT at this point (we publish in the `publish`
      # job, after BCR uploads its attestations), so the `tag_name` git tag does
      # not exist yet. publish-to-bcr checks out the module repo at
      # `templates_ref || tag_name`; pin templates_ref to the release commit so
      # the checkout works without the tag. (This is the draft/immutable path.)
      templates_ref: ${{ github.sha }}
      # Consume the `release_files` + `attestations` workflow artifacts the
      # `assets` job uploaded in this run (defaults: download_default_release_artifacts
      # = true, release_artifacts_run_id = github.run_id). publish-to-bcr (>= the
      # PR #375 fix, present in v1.4.1) uses these LOCAL artifacts rather than
      # fetching from the Release URL — which is exactly what makes it work with
      # draft / immutable releases. `attest: true` attaches provenance to the
      # BCR entry (and, in draft mode, to the still-draft Release).
      attest: true
      # Commit the BCR entry as a single, stable bot identity. The Google CLA
      # check (cla/google) verifies EVERY commit author AND committer in the PR.
      # By default publish-to-bcr authors the commit as `github.actor` (whoever
      # merged the release PR) and commits as `github-actions[bot]` — so the CLA
      # would be gated on the bot AND on each releaser individually. Pinning both
      # to `elidebot` means exactly one identity must be CLA-covered.
      # PREREQUISITE: the elidebot GitHub account must have `elidebot@elide.dev`
      # as a verified email and have signed Google's CLA (or be listed under
      # Elide's corporate CLA), or cla/google will fail on `elidebot` instead.
      author_name: elidebot
      author_email: elidebot@elide.dev
      committer_name: elidebot
      committer_email: elidebot@elide.dev
      # Push the entry branch to the fork (as elidebot, via publish_token) but do
      # NOT open the PR here — the `bcr-pr` job below opens it under sgammon's own
      # token so he controls the PR (mark ready, etc.) independently of the bot.
      open_pull_request: false
    secrets:
      publish_token: ${{ secrets.PUBLISH_TOKEN }}

  # Publish the draft release only AFTER BCR has attached its attestations (both
  # asset upload and attestation upload need a mutable draft). Publishing here
  # finalizes the release and binds the git tag, so the flow is compatible with
  # immutable releases (no post-publish uploads).
  #
  # Tag signing: when an elidebot GPG key is configured (ELIDEBOT_GPG_PRIVATE_KEY
  # secret), we create a GPG-SIGNED ANNOTATED tag at the release commit and push
  # it as elidebot BEFORE un-drafting; GitHub then binds the release to that
  # existing signed tag (shown "Verified") instead of auto-creating a lightweight
  # one. Without the secret, this degrades gracefully: no tag is pushed and
  # un-drafting creates the usual lightweight tag — so this is safe to merge
  # before the key exists.
  publish:
    name: publish the release
    needs: [release-please, bcr]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Detect elidebot signing key
        id: gpg
        env:
          GPG_KEY: ${{ secrets.ELIDEBOT_GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ELIDEBOT_GPG_PRIVATE_KEY not set — publishing with an unsigned lightweight tag."
          fi
      - name: Check out the release commit (for tagging)
        if: steps.gpg.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.sha }}
          # Push the signed tag as elidebot, not the default Actions token.
          token: ${{ secrets.PUBLISH_TOKEN }}
      - name: Import elidebot GPG key
        if: steps.gpg.outputs.enabled == 'true'
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828  # v7.0.0
        with:
          # The elidebot key has no passphrase, so only the private-key secret is
          # needed (no `passphrase:` input).
          gpg_private_key: ${{ secrets.ELIDEBOT_GPG_PRIVATE_KEY }}
          # Configure git to sign tags and set user.name/email from the key UID
          # (elidebot <elidebot@elide.dev>), so the tagger matches a CLA/Verified
          # identity.
          git_user_signingkey: true
          git_tag_gpgsign: true
      - name: Create + push the signed annotated tag
        if: steps.gpg.outputs.enabled == 'true'
        run: |
          git tag -s "$TAG" -m "Release $TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"
      - name: Publish the draft release
        # --repo is required because the no-signing path runs WITHOUT a checkout:
        # `gh` would otherwise try to infer the repo from a local git remote and
        # fail with "not a git repository". (Harmless when the signing path has
        # checked out the repo.)
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest

  # Open the BCR pull request under sgammon's OWN token (PR_TOKEN_SGAMMON: repo
  # scope on his account, used ONLY here) rather than the bot's. publish-to-bcr
  # already pushed the entry branch `rules_elide-<tag>` to the fork as elidebot
  # (open_pull_request: false above); filing the PR here makes sgammon the PR
  # author, so he controls it (e.g. mark ready for review). The commit's
  # author/committer remain elidebot, so the CLA check is unaffected. Runs AFTER
  # `publish` so the release asset the BCR presubmit downloads is already public
  # (the PR is opened as a draft for sgammon to take ready himself).
  bcr-pr:
    name: open the BCR pull request
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    environment: bcr
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Open the BCR pull request as sgammon
        env:
          PR_TOKEN: ${{ secrets.PR_TOKEN_SGAMMON }}
        run: |
          set -o errexit -o nounset -o pipefail
          version="${TAG#v}"
          body="$(printf 'Release: https://github.com/%s/releases/tag/%s\n\n_Filed by the rules_elide release workflow under @sgammon; entry pushed by elidebot._' "$GITHUB_REPOSITORY" "$TAG")"
          request="$(jq --null-input \
            --arg title "rules_elide@${version}" \
            --arg body "$body" \
            --arg head "elide-dev:rules_elide-${TAG}" \
            --arg base "main" \
            '{title: $title, body: $body, head: $head, base: $base, maintainer_can_modify: true, draft: true}')"
          curl --fail-with-body --location --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PR_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bazelbuild/bazel-central-registry/pulls \
            --data "$request"
