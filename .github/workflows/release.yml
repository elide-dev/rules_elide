name: release

on:
  push:
    branches: [main]

# Don't cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: rp
        with:
          # The enterprise policy forbids the default GITHUB_TOKEN from creating
          # pull requests, so release-please authenticates with a PAT (a user
          # token is not subject to that Actions policy). PUBLISH_TOKEN is a
          # classic PAT with `repo` + `workflow` scope.
          token: ${{ secrets.PUBLISH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  assets:
    name: release assets + provenance
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # upload release assets
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the provenance/SBOM attestations
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The release is a DRAFT here (immutable-releases compatible), so the
          # git tag does not exist yet — check out the release-PR merge commit
          # (github.sha, the commit release-please released) rather than the tag.
          fetch-depth: 0
      - name: Tag the checked-out commit locally for the source archive
        # release_prep.sh runs `git archive <tag>`; create the tag locally so the
        # archive resolves. The real remote tag is created when the draft is
        # published below.
        run: git tag --force "$TAG"
      - name: Build release assets
        run: .github/workflows/release_prep.sh "$TAG" > usage_notes.md
      - name: Generate SPDX SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          file: rules_elide-${{ env.TAG }}.tar.gz
          format: spdx-json
          output-file: rules_elide-${{ env.TAG }}.spdx.json
          upload-artifact: false
      - name: Enrich SBOM with MODULE.bazel deps
        run: python3 tools/sbom_enrich.py "rules_elide-${TAG}.spdx.json" MODULE.bazel
      - name: Upload assets to the release
        run: |
          gh release upload "$TAG" \
            "rules_elide-${TAG}.tar.gz" \
            "rules_elide-${TAG}.docs.tar.gz" \
            "rules_elide-${TAG}.spdx.json" \
            --clobber
      - name: Append Bzlmod usage notes to the release body
        run: |
          gh release view "$TAG" --json body --jq .body > body.md
          printf '\n\n' >> body.md
          cat usage_notes.md >> body.md
          gh release edit "$TAG" --notes-file body.md
      - name: Attest build provenance (Sigstore, SLSA Build L2)
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            rules_elide-${{ env.TAG }}.tar.gz
            rules_elide-${{ env.TAG }}.docs.tar.gz
            rules_elide-${{ env.TAG }}.spdx.json
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: rules_elide-${{ env.TAG }}.tar.gz
          sbom-path: rules_elide-${{ env.TAG }}.spdx.json
      # Stage the workflow artifacts publish-to-bcr consumes (bazel-contrib
      # release_ruleset's contract): `release_files` (the archives) and
      # `attestations` (per-archive <name>.intoto.jsonl = the provenance bundle
      # compacted via `jq -c`). The `bcr` job downloads these from this run, so
      # it never fetches from the (draft/immutable) Release URL.
      - name: Stage release_files + attestations for publish-to-bcr
        run: |
          mkdir -p attestations
          for a in "rules_elide-${TAG}.tar.gz" "rules_elide-${TAG}.docs.tar.gz"; do
            jq -c . < "${{ steps.attest.outputs.bundle-path }}" > "attestations/${a}.intoto.jsonl"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release_files
          path: |
            rules_elide-${{ env.TAG }}.tar.gz
            rules_elide-${{ env.TAG }}.docs.tar.gz
            rules_elide-${{ env.TAG }}.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: attestations
          path: attestations/

  bcr:
    name: publish to BCR
    needs: [release-please, assets]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@c316f1611511a40423572303f66c80bb30bfe2f8  # v1.4.1
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      registry_fork: elide-dev/bazel-central-registry
      # The release is still a DRAFT at this point (we publish in the `publish`
      # job, after BCR uploads its attestations), so the `tag_name` git tag does
      # not exist yet. publish-to-bcr checks out the module repo at
      # `templates_ref || tag_name`; pin templates_ref to the release commit so
      # the checkout works without the tag. (This is the draft/immutable path.)
      templates_ref: ${{ github.sha }}
      # Consume the `release_files` + `attestations` workflow artifacts the
      # `assets` job uploaded in this run (defaults: download_default_release_artifacts
      # = true, release_artifacts_run_id = github.run_id). publish-to-bcr (>= the
      # PR #375 fix, present in v1.4.1) uses these LOCAL artifacts rather than
      # fetching from the Release URL — which is exactly what makes it work with
      # draft / immutable releases. `attest: true` attaches provenance to the
      # BCR entry (and, in draft mode, to the still-draft Release).
      attest: true
    secrets:
      publish_token: ${{ secrets.PUBLISH_TOKEN }}

  # Publish the draft release only AFTER BCR has attached its attestations (both
  # asset upload and attestation upload need a mutable draft). Publishing here
  # finalizes the release — creating the real tag and baking in all assets — so
  # the flow is compatible with immutable releases (no post-publish uploads).
  publish:
    name: publish the release
    needs: [release-please, bcr]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Publish the draft release
        run: gh release edit "$TAG" --draft=false --latest
