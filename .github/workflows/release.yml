name: release

on:
  push:
    branches: [main]

# Don't cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: rp
        with:
          # The enterprise policy forbids the default GITHUB_TOKEN from creating
          # pull requests, so release-please authenticates with a PAT (a user
          # token is not subject to that Actions policy). PUBLISH_TOKEN is a
          # classic PAT with `repo` + `workflow` scope. release-please creates a
          # DRAFT release (config draft:true) but, for a draft, GitHub does not
          # create the git tag — the `tag` job below does that.
          token: ${{ secrets.PUBLISH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Create + push the git tag at the release commit BEFORE release_ruleset, which
  # checks out the tag (`actions/checkout ref: tag_name`). release-please's draft
  # release does not create the tag. When the elidebot GPG key is configured the
  # tag is GPG-signed ("Verified"); otherwise it's an unsigned annotated tag (so
  # release_ruleset can still check it out). The tag is pushed as elidebot.
  tag:
    name: create the release tag
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Detect elidebot signing key
        id: gpg
        env:
          GPG_KEY: ${{ secrets.ELIDEBOT_GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_KEY" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ELIDEBOT_GPG_PRIVATE_KEY not set — pushing an unsigned annotated tag."
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.sha }}
          # Push the tag as elidebot (not the default Actions token).
          token: ${{ secrets.PUBLISH_TOKEN }}
      - name: Import elidebot GPG key
        if: steps.gpg.outputs.signed == 'true'
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828  # v7.0.0
        with:
          # The elidebot key has no passphrase, so only the private-key secret is
          # needed (no `passphrase:` input). Sets git user.name/email from the key
          # UID (elidebot <elidebot@elide.dev>) and enables tag signing.
          gpg_private_key: ${{ secrets.ELIDEBOT_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_tag_gpgsign: true
      - name: Create + push the tag
        run: |
          set -o errexit -o nounset -o pipefail
          if [ "${{ steps.gpg.outputs.signed }}" = "true" ]; then
            git tag -s "$TAG" -m "Release $TAG" "$GITHUB_SHA"
          else
            git -c user.name=elidebot -c user.email=elidebot@elide.dev \
              tag -a "$TAG" -m "Release $TAG" "$GITHUB_SHA"
          fi
          git push origin "refs/tags/$TAG"

  # Build + test + attest the release via bazel-contrib's canonical release_ruleset
  # workflow (TAG-referenced — this is what makes the source-archive attestation
  # verifiable by BCR: the builder identity is release_ruleset@v7.7.0 with a real
  # tag ref, not our own workflow). It checks out the tag (created above), runs
  # the test gate, runs `.github/workflows/release_prep.sh` to build the archives
  # + SBOM, attests them (per-archive .intoto.jsonl), and upserts the artifacts +
  # attestations onto release-please's existing DRAFT release (softprops finds the
  # draft by tag). It also uploads `release_files` + `attestations` workflow
  # artifacts, which the `bcr` job consumes.
  release:
    name: build + attest (release_ruleset)
    needs: [release-please, tag]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write       # upload release assets to the draft
      id-token: write       # OIDC for the build-provenance attestation
      attestations: write   # write the attestation
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.7.0
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      # Keep the release a DRAFT: publish-to-bcr uploads its attestations to the
      # draft, and we un-draft only after BCR is done (immutable-release safe).
      draft: true
      prerelease: false
      # Release gate — same suite CI runs on the merge. release_ruleset appends
      # the disk/repository cache flags itself.
      bazel_test_command: bazel test //tests:all --config=ci
      # The source + docs archives and the SPDX SBOM, all produced by
      # release_prep.sh (the SBOM is generated there so release_ruleset ships it).
      release_files: |
        rules_elide-*.tar.gz
        rules_elide-*.spdx.json

  bcr:
    name: publish to BCR
    needs: [release-please, release]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    # TAG-referenced (not a SHA): publish-to-bcr's own source.json / MODULE.bazel
    # attestations record the builder ref from this `uses:`, and BCR's
    # slsa-verifier rejects a bare-SHA ref ("unexpected ref type"). A tag ref
    # (refs/tags/v1.4.1) verifies.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.4.2
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      registry_fork: elide-dev/bazel-central-registry
      # Run in the `bcr` deployment environment (protection rules / tracking).
      environment: bcr
      # Consume the `release_files` + `attestations` workflow artifacts that
      # release_ruleset uploaded in this run (download_default_release_artifacts
      # defaults true, release_artifacts_run_id defaults github.run_id). The
      # source-archive attestation therefore comes from release_ruleset (a
      # builder BCR trusts). The tag exists (created in `tag`), so publish-to-bcr
      # checks out the module repo at tag_name directly — no templates_ref needed.
      attest: true
      # Commit the BCR entry as a single CLA-covered identity (cla/google checks
      # every author AND committer). elidebot must have elidebot@elide.dev as a
      # verified email and have signed Google's CLA.
      author_name: elidebot
      author_email: elidebot@elide.dev
      committer_name: elidebot
      committer_email: elidebot@elide.dev
      # Push the entry branch to the fork (as elidebot) but do NOT open the PR
      # here — the `bcr-pr` job opens it under sgammon's own token.
      open_pull_request: false
    secrets:
      publish_token: ${{ secrets.PUBLISH_TOKEN }}

  # Un-draft the release only AFTER BCR has uploaded its attestations to the draft
  # (immutable-release safe — no post-publish asset uploads). The signed tag was
  # already created in the `tag` job, so this just flips the draft bit.
  publish:
    name: publish the release
    needs: [release-please, bcr]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Publish the draft release
        # --repo is required: this job has no checkout, so `gh` can't infer the
        # repo from a local git remote.
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest

  # Open the BCR pull request under sgammon's OWN token (PR_TOKEN_SGAMMON: repo
  # scope on his account, used ONLY here) rather than the bot's. publish-to-bcr
  # already pushed the entry branch `rules_elide-<tag>` to the fork as elidebot
  # (open_pull_request: false above); filing the PR here makes sgammon the PR
  # author so he controls it (mark ready, etc.). The commit author/committer
  # remain elidebot, so cla/google is unaffected. Runs AFTER `publish` so the
  # release asset the BCR presubmit downloads is already public; the PR is opened
  # as a draft for sgammon to take ready himself.
  bcr-pr:
    name: open the BCR pull request
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    environment: bcr
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Open the BCR pull request as sgammon
        env:
          PR_TOKEN: ${{ secrets.PR_TOKEN_SGAMMON }}
        run: |
          set -o errexit -o nounset -o pipefail
          version="${TAG#v}"
          body="$(printf 'Release: https://github.com/%s/releases/tag/%s\n\n_Filed by the rules_elide release workflow under @sgammon; entry pushed by elidebot._' "$GITHUB_REPOSITORY" "$TAG")"
          request="$(jq --null-input \
            --arg title "rules_elide@${version}" \
            --arg body "$body" \
            --arg head "elide-dev:rules_elide-${TAG}" \
            --arg base "main" \
            '{title: $title, body: $body, head: $head, base: $base, maintainer_can_modify: true, draft: true}')"
          curl --fail-with-body --location --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PR_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/bazelbuild/bazel-central-registry/pulls \
            --data "$request"
