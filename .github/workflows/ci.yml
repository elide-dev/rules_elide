name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: tests (bazel ${{ matrix.bazel }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Bazel 8+ only (protobuf 35.x requires >=8.0.0; see MODULE.bazel
        # bazel_compatibility).
        bazel: ["8.x", "9.x"]
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-${{ matrix.bazel }}-${{ matrix.os }}
          repository-cache: true
      - name: bazel test //tests:all
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: bazel test //tests:all --config=ci

  e2e:
    name: e2e smoke (analysis)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-e2e
          repository-cache: true
      - name: bazel build //... --nobuild
        working-directory: e2e/smoke
        run: bazel build //... --nobuild

  lint:
    name: lint (pre-commit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit==4.6.0
      - run: pre-commit run --all-files --show-diff-on-failure

  docs-freshness:
    name: docs freshness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-docs
          repository-cache: true
      - name: regenerate docs
        run: ./tools/update_docs.sh
      - name: assert docs are up to date
        run: git diff --exit-code -- docs/

  integration:
    name: integration (real elide toolchain)
    runs-on: ubuntu-24.04
    # Slow: downloads ~500 MB elide binary at repo-rule time. Run on schedule
    # and on main pushes; PRs only get the analysis-level signal from
    # the `e2e` job above.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-integration
          repository-cache: true
      - name: bazel build //... (excluding :native_app, blocked upstream)
        working-directory: e2e/integration
        # //:native_app is gated on an upstream Elide CLI fix (NPE in
        # JavaCommand.selectDelegateJvm under Bazel sandbox env).
        # See README "Roadmap" entry "elide native-image under Bazel".
        run: bazel build -- //... -//:native_app

  kotlin-builder:
    name: kotlin-builder e2e (rules_kotlin toolchain swap)
    runs-on: ubuntu-24.04
    # Same gate as `integration`: downloads the Elide binary. PRs get
    # analysis-level coverage from the `e2e` job; this validates actual
    # compilation through the KotlinBuilder shim on main pushes.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: bazel-contrib/setup-bazel@8cb04a772ab4c1eb984e9c1b493a182e96c5e425  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-kotlin-builder
          repository-cache: true
      - name: bazel build //:greeter //:annotated
        working-directory: e2e/kotlin_builder
        # //:greeter — plain kt_jvm_library, takes the Elide fast path.
        # //:annotated — kt_jvm_library with annotation processors, exercises
        # the transparent KAPT fallback to the stock rules_kotlin KotlinBuilder.
        run: bazel build //:greeter //:annotated
