name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: tests (bazel ${{ matrix.bazel }} / ${{ matrix.os }})
    # Skip release-please PRs: they only touch CHANGELOG/version files and are
    # re-validated on main after merge. head_ref is empty on push, so main
    # pushes are unaffected. (Same guard on the other PR-running jobs below.)
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Bazel 8+ only (protobuf 35.x requires >=8.0.0; see MODULE.bazel
        # bazel_compatibility).
        bazel: ["8.x", "9.x"]
        os: [ubuntu-24.04, macos-14]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-${{ matrix.bazel }}-${{ matrix.os }}
          repository-cache: true
      - name: bazel test //tests:all
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: bazel test //tests:all --config=ci

  e2e:
    name: e2e smoke (analysis)
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-e2e
          repository-cache: true
      - name: bazel build //... --nobuild
        working-directory: e2e/smoke
        run: bazel build //... --nobuild

  lint:
    name: lint (pre-commit)
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install pre-commit==4.6.0
      - run: pre-commit run --all-files --show-diff-on-failure

  docs-freshness:
    name: docs freshness
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-docs
          repository-cache: true
      - name: regenerate docs
        run: ./tools/update_docs.sh
      - name: assert docs are up to date
        run: git diff --exit-code -- docs/

  integration:
    name: integration (real elide toolchain)
    runs-on: ubuntu-24.04
    # Slow: downloads ~500 MB elide binary at repo-rule time. Run on schedule
    # and on main pushes; PRs only get the analysis-level signal from
    # the `e2e` job above.
    if: github.event_name != 'pull_request'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-integration
          repository-cache: true
      - name: bazel build //... (excluding :native_app, blocked upstream)
        working-directory: e2e/integration
        # //:native_app is gated on an upstream Elide CLI fix (NPE in
        # JavaCommand.selectDelegateJvm under Bazel sandbox env).
        # See README "Roadmap" entry "elide native-image under Bazel".
        run: bazel build -- //... -//:native_app

  kotlin-builder:
    name: kotlin-builder e2e (rules_kotlin toolchain swap)
    runs-on: ubuntu-24.04
    # Same gate as `integration`: downloads the Elide binary. PRs get
    # analysis-level coverage from the `e2e` job; this validates actual
    # compilation through the KotlinBuilder shim on main pushes.
    if: github.event_name != 'pull_request'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-kotlin-builder
          repository-cache: true
      - name: bazel build //:greeter //:annotated
        working-directory: e2e/kotlin_builder
        # //:greeter — plain kt_jvm_library, takes the Elide fast path.
        # //:annotated — kt_jvm_library with annotation processors, exercises
        # the transparent KAPT fallback to the stock rules_kotlin KotlinBuilder.
        run: bazel build //:greeter //:annotated

  rbe:
    name: rbe (BuildBuddy)
    runs-on: ubuntu-24.04
    # Needs the BUILDBUDDY_API_KEY secret, which GitHub does not expose to fork
    # PRs — gate to same-repo events (main pushes + same-repo PRs). Like
    # `integration`, this also downloads the elide binary at repo-rule time.
    if: >-
      !startsWith(github.head_ref, 'release-please--') &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository))
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ci-rbe
          repository-cache: true
      - name: Configure BuildBuddy API key
        working-directory: e2e/rbe
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        # Inject the key the way .bazelrc's try-import expects. Written to a file
        # (never echoed) so it stays out of the build log.
        run: |
          set -euo pipefail
          if [ -z "${BUILDBUDDY_API_KEY:-}" ]; then
            echo "BUILDBUDDY_API_KEY secret is empty — cannot run RBE." >&2
            exit 1
          fi
          printf 'common --remote_header=x-buildbuddy-api-key=%s\n' "${BUILDBUDDY_API_KEY}" > user.bazelrc
      - name: bazel test //... --config=remote
        working-directory: e2e/rbe
        # Full remote: cache + execution + BES. Bazel prints the BuildBuddy
        # invocation URL (from --bes_results_url) at the top of the run.
        run: bazel test //... --config=remote --config=ci
