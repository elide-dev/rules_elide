name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "32 4 * * 1"

permissions: read-all

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    # Code scanning result upload requires GitHub Advanced Security /
    # Code Security, which is free for public repos but paid on private
    # ones. Skip the job while the repository is private; it will resume
    # automatically when the repo flips to public.
    # Public repo only (Code Security), and skip only same-repo release-please
    # PRs (they touch CHANGELOG/version files only; re-scanned on main after
    # merge). The `event_name == 'pull_request'` guard keeps push/schedule from
    # reading pull_request fields; the same-repo check stops a fork PR from
    # skipping the scan by naming its branch `release-please--*`.
    if: >-
      github.event.repository.visibility == 'public' &&
      !(github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.head_ref, 'release-please--'))
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions override workflow-level read-all; restate
      # contents: read so actions/checkout can clone a private repo.
      # actions: read is required by language=actions analysis so the
      # init action can read workflow files via the Actions API.
      contents: read
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
