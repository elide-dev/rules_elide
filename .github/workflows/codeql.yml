name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "32 4 * * 1"

permissions: read-all

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    # Code scanning result upload requires GitHub Advanced Security /
    # Code Security, which is free for public repos but paid on private
    # ones. Skip the job while the repository is private; it will resume
    # automatically when the repo flips to public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions override workflow-level read-all; restate
      # contents: read so actions/checkout can clone a private repo.
      # actions: read is required by language=actions analysis so the
      # init action can read workflow files via the Actions API.
      contents: read
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
