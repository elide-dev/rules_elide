name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "32 4 * * 1"

permissions: read-all

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    # Code scanning result upload requires GitHub Advanced Security /
    # Code Security, which is free for public repos but paid on private
    # ones. Skip the job while the repository is private; it will resume
    # automatically when the repo flips to public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-24.04
    permissions:
      # Job-level permissions override workflow-level read-all; restate
      # contents: read so actions/checkout can clone a private repo.
      # actions: read is required by language=actions analysis so the
      # init action can read workflow files via the Actions API.
      contents: read
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
