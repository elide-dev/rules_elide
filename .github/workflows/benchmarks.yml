name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # weekly: Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      n:
        description: "Number of generated sources per language"
        default: "50"
        required: false
      runs:
        description: "Measured runs per target"
        default: "3"
        required: false

concurrency:
  group: benchmarks-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Per-PR (and main-baseline) compile-speed tracking via CodSpeed walltime.
  walltime:
    name: compile benchmarks (walltime)
    # Self-hosted infra must not run untrusted fork code: gate to same-repo PRs
    # (and main pushes). Fork PRs are skipped here. Also skip release-please
    # branches (e.g. `release-please--branches--main--…`): those PRs only touch
    # CHANGELOG/version files, so benchmarking them just burns the dedicated
    # bench runner.
    if: >-
      (github.event_name == 'push' &&
       !startsWith(github.ref_name, 'release-please')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       !startsWith(github.head_ref, 'release-please'))
    permissions:
      contents: read
      id-token: write  # OIDC auth to CodSpeed (no upload token needed)
    # Dedicated single AMD64 bench instance (the `linux-amd64-bench` label is
    # applied to exactly one machine) so walltime is measured on consistent
    # hardware. Walltime needs an unshared machine to be reliable, on x86_64
    # (CodSpeed's managed macro runners are ARM64-only, which we do not want).
    runs-on: linux-amd64-bench
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      # Bazel for the e2e-build benchmarks (test_e2e_bench.py builds
      # e2e/integration). GHA caching is disabled: the dedicated bench runner
      # persists its own Bazel state between runs, and benchmark builds should be
      # free of actions/cache restore/save variability. (The e2e build also
      # disables disk/remote action caches so cold/incremental timings reflect
      # real compile work.)
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: false
          disk-cache: false
          repository-cache: false

      # Stock javac + kotlinc 2.4.0 for the no-Elide baseline micro-benchmarks
      # (test_kotlinc_full[vanilla] / test_javac_full[vanilla]). setup-java puts
      # javac on PATH and sets JAVA_HOME (which the kotlinc launcher needs).
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
      - name: Install stock kotlinc 2.4.0 (npm kotlin-compiler via bun)
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/kotlinc"
          (cd "$RUNNER_TEMP/kotlinc" && bun add kotlin-compiler@2.4.0)
          kc="$RUNNER_TEMP/kotlinc/node_modules/kotlin-compiler/bin/kotlinc"
          chmod +x "$kc"
          echo "KOTLINC=$kc" >> "$GITHUB_ENV"
          "$kc" -version || true

      - name: Download pinned Elide release (linux-amd64)
        # Benchmarks invoke `elide` directly (no Bazel), so fetch the same
        # release the repo pins in versions.bzl. Pinning the version keeps the
        # signal a function of rules_elide changes (and deliberate Elide bumps),
        # not nightly drift between runs.
        run: |
          set -euo pipefail
          ver="$(awk -F'"' '/^DEFAULT_VERSION = /{print $2}' elide/private/versions.bzl)"
          echo "Elide version: $ver"
          base="https://github.com/elide-dev/elide/releases/download/$ver"
          curl -fsSL -o elide.tgz "$base/elide.linux-amd64.tgz"
          curl -fsSL -o elide.tgz.sha256 "$base/elide.linux-amd64.tgz.sha256"
          echo "$(awk '{print $1}' elide.tgz.sha256)  elide.tgz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/elide"
          tar -xzf elide.tgz -C "$RUNNER_TEMP/elide"
          echo "ELIDE=$RUNNER_TEMP/elide/bin/elide" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/elide/bin/elide" --version || true

      - name: Run walltime benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286  # v4.18.5
        env:
          # Disable the supplementary CPU profiler. It targets in-process
          # benchmarks; neither backend handles our subprocess-spawning ones
          # (Bazel server + JVM workers + native-image) on this runner — perf's
          # parser rejects the perf.data, and samply hangs the job after the run
          # finishes. The walltime *timings* (from pytest-codspeed) are still
          # produced and uploaded; only the CPU flame graph is dropped, which is
          # not meaningful for a subprocess build/compile benchmark anyway.
          CODSPEED_PROFILER_ENABLED: "false"
        with:
          mode: walltime
          # uv provisions the deps ephemerally for this one invocation; the
          # requirements file is the source of truth (also used for local runs).
          run: uv run --no-project --with-requirements benchmarks/codspeed/requirements.txt pytest benchmarks/codspeed --codspeed

  # Weekly whole-build hyperfine suite (rules_elide vs vanilla), kept as an
  # artifact for trend-watching; too heavy for per-PR.
  bench:
    name: rules_elide vs vanilla
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: bench
          repository-cache: true
      - name: run benchmark
        working-directory: benchmarks
        env:
          BAZELISK: bazelisk
          BENCH_N: ${{ inputs.n || '50' }}
          BENCH_RUNS: ${{ inputs.runs || '3' }}
        run: |
          ./bench.sh "${BENCH_N}" "${BENCH_RUNS}" | tee results.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark-results
          path: benchmarks/results.txt
          retention-days: 90
