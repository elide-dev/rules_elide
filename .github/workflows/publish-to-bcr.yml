name: publish-to-bcr

on:
  release:
    types: [published]

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  publish:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@0a23c53c2baffdaf2ce8dd23c2c0e45eb3b79093  # v1.2.0
    permissions:
      attestations: write
      contents: write
      id-token: write
    with:
      tag_name: ${{ github.event.release.tag_name }}
      registry_fork: elide-dev/bazel-central-registry
    secrets:
      publish_token: ${{ secrets.PUBLISH_TOKEN }}
