# Static linter metadata only — this file runs nothing and assigns no work. It
# just tells the `actionlint` hook that `linux-amd64-bench` is a valid runner
# label so it isn't flagged as unknown. The only job that actually targets that
# instance is the `walltime` job in benchmarks.yml.
self-hosted-runner:
  labels:
    - linux-amd64-bench
